<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="100%" height="100%">
  <!-- Background with slight roundness for modern feel -->
  <rect width="32" height="32" rx="8" fill="#0f172a"/> 
  
  <!-- Kanban / Chart Columns with a vibrant modern gradient -->
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" /> <!-- Indigo 500 -->
      <stop offset="100%" stop-color="#d946ef" /> <!-- Fuchsia 500 -->
    </linearGradient>
  </defs>

  <!-- Left Column (To-Do) -->
  <rect x="7" y="14" width="4" height="11" rx="1.5" fill="url(#brandGradient)" opacity="0.6"/>
  <!-- Middle Column (In Progress) -->
  <rect x="14" y="8" width="4" height="17" rx="1.5" fill="url(#brandGradient)" opacity="0.8"/>
  <!-- Right Column (Done) -->
  <rect x="21" y="11" width="4" height="14" rx="1.5" fill="url(#brandGradient)"/>
  
  <!-- "Done" Notification/Collaboration Dot -->
  <circle cx="23" cy="6" r="2.5" fill="#22c55e" /> <!-- Emerald 500 -->
</svg>
